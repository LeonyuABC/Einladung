<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wann hast du Zeit?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="card">
        <p class="step">02 / 03</p>
        <h1>Wann hast du Zeit?</h1>

        <form id="date-form" class="form-stack">
            <label class="field-label" for="date">Such dir einen Tag aus</label>
            <input class="date-input" id="date" name="date" type="date">
            <p id="date-preview" class="date-preview" aria-live="polite"></p>

            <label class="choice-card delegate-choice">
                <input id="delegate" name="delegate" type="checkbox">
                <span>Überlass es mir</span>
            </label>

            <fieldset class="fieldset">
                <legend>Wann passt es dir besser?</legend>
                <div class="time-options">
                    <label class="choice-pill">
                        <input type="radio" name="time" value="Nachmittags" required>
                        <span>Nachmittags</span>
                    </label>
                    <label class="choice-pill">
                        <input type="radio" name="time" value="Abends">
                        <span>Abends</span>
                    </label>
                    <label class="choice-pill">
                        <input type="radio" name="time" value="Egal">
                        <span>Egal</span>
                    </label>
                </div>
            </fieldset>

            <p id="date-error" class="error-message" aria-live="polite"></p>
            <button class="primary-button" type="submit">Weiter</button>

            <div class="secondary-actions">
                <a class="back-link" href="index.html">← Zurück</a>
                <button id="skip-date" class="text-button" type="button">Überspringen</button>
            </div>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
